<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/layout/basic :: setContent(~{this::content})}">

    <th:block th:fragment="content">

<!-- 공지사항 제목 -->
<section class="notice-title table-wrapper">



        <h1>REGISTER</h1>

        <form th:action="@{/webboard/register}" th:method="post">

            <div class="form-group text-start">
                <label class="mb-2"> Title </label>
                <input type="text" class="mb-3 form-control" name="title" placeholder="Enter Title">
            </div>


            <div class="form-group text-start">
                <label class="mb-2"> Content </label>
                <textarea type="text" class="mb-3 form-control" name="content" rows="15"></textarea>
            </div>

            <div class="form-group text-start">
                <label class="mb-2"> Writer </label>
                <input type="text" class="mb-3 form-control" name="writer" placeholder="Enter Writer">
            </div>

            <button type="submit" class="mt-3 btn btn-primary btn-lg">Submit</button>

        </form>


</section>

    </th:block>
</th:block>
</html>
